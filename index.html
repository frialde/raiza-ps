<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raiza Penalty Shootout</title>
    
    <!-- Three.js for 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Canvas Confetti for Win Celebration -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        /* --- GLOBAL STYLES & CSS RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevents pull-to-refresh and scrolling on mobile */
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- UI OVERLAYS --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas by default */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 20, 40, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #D6A848; /* Gold accent */
            color: white;
            text-align: center;
            pointer-events: auto; /* Enable clicks on visible screens */
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transform: scale(0.9);
            animation: popIn 0.3s forwards ease-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        h1 {
            font-size: 2.5rem;
            color: #E21C3F; /* FC Barcelona red */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #004D98, -1px -1px 0 #fff; /* Barca Blue & White stroke */
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ddd;
            line-height: 1.5;
        }

        .reward-text {
            font-size: 1.5rem;
            color: #D6A848; /* Gold */
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(214, 168, 72, 0.5);
        }

        button.action-btn {
            background: linear-gradient(135deg, #004D98, #003366);
            color: white;
            border: 2px solid #D6A848;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, filter 0.2s;
        }

        button.action-btn:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* --- IN-GAME HUD --- */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 5;
        }

        #mute-btn {
            pointer-events: auto;
            background: rgba(0,0,0,0.5);
            border: 1px solid #fff;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Swipe indicator */
        #swipe-hint {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            pointer-events: none;
            animation: floatUp 1.5s infinite;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 4;
        }

        #swipe-hint::before {
            content: '↑';
            font-size: 2rem;
            margin-bottom: -5px;
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, 10px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -20px); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- 3D Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Heads Up Display -->
    <div id="hud">
        <div style="width: 40px;"></div> <!-- Spacer -->
        <button id="mute-btn">🔊</button>
    </div>

    <!-- Swipe Hint -->
    <div id="swipe-hint">SWIPE TO KICK</div>

    <!-- UI Overlay Layer -->
    <div id="ui-layer">
        
        <!-- TITLE SCREEN -->
        <div id="screen-title" class="screen active">
            <h1>Raiza Penalty Shootout</h1>
            <p>Swipe up or aim to kick the ball past the goalkeeper and score a goal!</p>
            <button class="action-btn" id="btn-start">Start Match</button>
        </div>

        <!-- WIN SCREEN -->
        <div id="screen-win" class="screen">
            <h1>GOAL!!!</h1>
            <p class="reward-text">You have won your fifth monthsary date with Ralph Frialde!</p>
            <button class="action-btn" id="btn-play-again">Play Again</button>
        </div>

        <!-- MISS SCREEN -->
        <div id="screen-miss" class="screen">
            <h1>SAVED / MISS</h1>
            <p>The keeper got to it, or it went wide!</p>
            <button class="action-btn" id="btn-retry">Try Again</button>
        </div>

    </div>

    <script>
        /**
         * RAIZA PENALTY SHOOTOUT
         * 3D WebGL Game using Three.js
         */

        // --- GAME CONSTANTS & STATE ---
        const GAME_STATE = {
            MENU: 0,
            AIMING: 1,
            KICKED: 2,
            RESULT: 3
        };
        let currentState = GAME_STATE.MENU;

        // Physics & Positions
        const BALL_START_POS = new THREE.Vector3(0, 0.11, 11);
        const GOAL_Z = 0;
        const GOAL_WIDTH = 7.32;
        const GOAL_HEIGHT = 2.44;
        const GRAVITY = -9.8;
        
        let ballVelocity = new THREE.Vector3(0, 0, 0);
        let goalieVelocity = new THREE.Vector3(0, 0, 0);
        let goalieTargetX = 0;
        let isMuted = false;

        // Input Tracking
        let touchStartX = 0;
        let touchStartY = 0;
        let touchTime = 0;

        // --- THREE.JS SETUP ---
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        // Camera: Placed behind the kicker
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 2.5, 16);
        camera.lookAt(0, 1, 0);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- PROCEDURAL TEXTURES (Canvas API) ---
        function createGrassTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Base green
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, 512, 512);
            
            // Add stripes
            ctx.fillStyle = '#346b2e';
            for(let i=0; i<512; i+=64) {
                ctx.fillRect(0, i, 512, 32);
            }

            // Draw Penalty Box Lines
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.strokeRect(100, 0, 312, 120); // Penalty box
            ctx.strokeRect(180, 0, 152, 40);  // 6-yard box
            
            // Penalty Spot
            ctx.beginPath();
            ctx.arc(256, 90, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createBallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 256);
            ctx.fillStyle = '#000000';
            for (let i=0; i<6; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*256, Math.random()*256, 20, 0, Math.PI*2);
                ctx.fill();
            }
            return new THREE.CanvasTexture(canvas);
        }

        // --- 3D OBJECTS ---

        // 1. The Pitch (Field)
        const grassGeo = new THREE.PlaneGeometry(60, 60);
        const grassMat = new THREE.MeshLambertMaterial({ map: createGrassTexture() });
        const pitch = new THREE.Mesh(grassGeo, grassMat);
        pitch.rotation.x = -Math.PI / 2;
        pitch.receiveShadow = true;
        scene.add(pitch);

        // 2. The Goal Post
        const goalGroup = new THREE.Group();
        const postGeo = new THREE.CylinderGeometry(0.06, 0.06, GOAL_HEIGHT);
        const postMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.3, roughness: 0.2 });
        
        const leftPost = new THREE.Mesh(postGeo, postMat);
        leftPost.position.set(-GOAL_WIDTH/2, GOAL_HEIGHT/2, 0);
        leftPost.castShadow = true;
        
        const rightPost = new THREE.Mesh(postGeo, postMat);
        rightPost.position.set(GOAL_WIDTH/2, GOAL_HEIGHT/2, 0);
        rightPost.castShadow = true;
        
        const crossGeo = new THREE.CylinderGeometry(0.06, 0.06, GOAL_WIDTH + 0.12);
        const crossbar = new THREE.Mesh(crossGeo, postMat);
        crossbar.rotation.z = Math.PI / 2;
        crossbar.position.set(0, GOAL_HEIGHT, 0);
        crossbar.castShadow = true;

        // Simple Netting (Translucent Back Plane)
        const netGeo = new THREE.BoxGeometry(GOAL_WIDTH, GOAL_HEIGHT, 2);
        const netMat = new THREE.MeshBasicMaterial({ color: 0xeeeeee, transparent: true, opacity: 0.2, wireframe: true });
        const net = new THREE.Mesh(netGeo, netMat);
        net.position.set(0, GOAL_HEIGHT/2, -1);

        goalGroup.add(leftPost, rightPost, crossbar, net);
        goalGroup.position.set(0, 0, GOAL_Z);
        scene.add(goalGroup);

        // 3. The Football
        const ballGeo = new THREE.SphereGeometry(0.11, 32, 32); // Standard Size 5
        const ballMat = new THREE.MeshStandardMaterial({ map: createBallTexture(), roughness: 0.4 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.castShadow = true;
        ball.position.copy(BALL_START_POS);
        scene.add(ball);

        // 4. The Goalkeeper
        const goalieGroup = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(0.5, 0.8, 0.3);
        const goalieMat = new THREE.MeshStandardMaterial({ color: 0x00ff00 }); // Green keeper kit
        const gBody = new THREE.Mesh(bodyGeo, goalieMat);
        gBody.position.y = 1.0;
        
        const headGeo = new THREE.SphereGeometry(0.15);
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
        const gHead = new THREE.Mesh(headGeo, skinMat);
        gHead.position.y = 1.6;

        goalieGroup.add(gBody, gHead);
        goalieGroup.position.set(0, 0, GOAL_Z + 0.5); // Slightly in front of line
        goalieGroup.castShadow = true;
        scene.add(goalieGroup);

        // 5. The Kicker (Raiza Character Model)
        // Mapped with raiza_front.png and raiza_back.png as requested.
        const kickerGroup = new THREE.Group();
        const textureLoader = new THREE.TextureLoader();
        
        // Fallback colors if images are missing locally, but will use the precise filenames provided.
        const tFront = textureLoader.load('raiza_front.png');
        const tBack = textureLoader.load('raiza_back.png');

        // Body block (FC Barcelona colors for sides/top/bottom to match the shirt)
        const shirtColor = new THREE.MeshLambertMaterial({ color: 0x004D98 }); 
        
        // Materials Array: [ right, left, top, bottom, front, back ]
        const torsoMaterials = [
            shirtColor, shirtColor, shirtColor, shirtColor,
            new THREE.MeshLambertMaterial({ map: tFront, color: 0xffffff }), // Front
            new THREE.MeshLambertMaterial({ map: tBack, color: 0xffffff })   // Back
        ];

        // Create a Box for the Torso/Body that represents the character
        const torsoGeo = new THREE.BoxGeometry(0.6, 1.8, 0.1); 
        const torso = new THREE.Mesh(torsoGeo, torsoMaterials);
        torso.position.y = 0.9; 
        torso.castShadow = true;
        
        // Add a simple kicking leg
        const legGeo = new THREE.BoxGeometry(0.15, 0.9, 0.15);
        const legMat = new THREE.MeshLambertMaterial({ color: 0x004D98 });
        const kickingLeg = new THREE.Mesh(legGeo, legMat);
        kickingLeg.position.set(0.15, 0.45, 0);
        
        // Pivot point for leg swing
        const legPivot = new THREE.Group();
        legPivot.position.set(0.15, 0.9, 0); // Hip joint
        kickingLeg.position.set(0, -0.45, 0); // Offset mesh down from pivot
        legPivot.add(kickingLeg);

        kickerGroup.add(torso);
        kickerGroup.add(legPivot);
        
        // Position kicker slightly behind the ball
        kickerGroup.position.set(-0.3, 0, BALL_START_POS.z + 1.5);
        scene.add(kickerGroup);

        // Stadium Background / Crowd (Procedural cylinder)
        const stadiumCanvas = document.createElement('canvas');
        stadiumCanvas.width = 512; stadiumCanvas.height = 128;
        const sCtx = stadiumCanvas.getContext('2d');
        sCtx.fillStyle = '#111'; sCtx.fillRect(0,0,512,128);
        for(let i=0; i<2000; i++) {
            sCtx.fillStyle = `hsl(${Math.random()*360}, 70%, 50%)`;
            sCtx.fillRect(Math.random()*512, Math.random()*128, 4, 4);
        }
        const stadiumTex = new THREE.CanvasTexture(stadiumCanvas);
        stadiumTex.wrapS = THREE.RepeatWrapping;
        
        const stadiumGeo = new THREE.CylinderGeometry(25, 25, 10, 32, 1, true, -Math.PI/2, Math.PI);
        const stadiumMat = new THREE.MeshBasicMaterial({ map: stadiumTex, side: THREE.BackSide });
        const stadium = new THREE.Mesh(stadiumGeo, stadiumMat);
        stadium.position.set(0, 5, 0);
        scene.add(stadium);


        // --- AUDIO SYSTEM (Web Audio API Synthesizer) ---
        // Generates audio purely from code to avoid missing file errors!
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (isMuted || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'whistle') {
                // High pitched double chirp
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(2000, now);
                osc.frequency.linearRampToValueAtTime(2200, now + 0.1);
                osc.frequency.setValueAtTime(0, now + 0.15); // pause
                osc.frequency.setValueAtTime(2000, now + 0.2);
                osc.frequency.linearRampToValueAtTime(2400, now + 0.4);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } 
            else if (type === 'kick') {
                // Low thump
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.2);
                gain.gain.setValueAtTime(1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
            else if (type === 'cheer' || type === 'aww') {
                // Filtered white noise for crowd
                const bufferSize = audioCtx.sampleRate * 3; // 3 seconds
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noiseSource = audioCtx.createBufferSource();
                noiseSource.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = type === 'cheer' ? 'bandpass' : 'lowpass';
                filter.frequency.value = type === 'cheer' ? 1000 : 400;

                noiseSource.connect(filter);
                filter.connect(gain);
                
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.5, now + 0.5);
                gain.gain.linearRampToValueAtTime(0, now + 3);
                
                noiseSource.start(now);
            }
        }

        // --- GAME LOGIC & PHYSICS ---

        function startGame() {
            initAudio();
            document.getElementById('screen-title').classList.remove('active');
            resetScenario();
            playSound('whistle');
            
            // Show hint
            document.getElementById('swipe-hint').style.display = 'flex';
        }

        function resetScenario() {
            currentState = GAME_STATE.AIMING;
            
            // Reset Ball
            ball.position.copy(BALL_START_POS);
            ballVelocity.set(0, 0, 0);
            ball.rotation.set(0,0,0);
            
            // Reset Goalie
            goalieGroup.position.x = 0;
            goalieVelocity.set(0,0,0);
            
            // Reset Kicker
            kickerGroup.position.set(-0.3, 0, BALL_START_POS.z + 1.5);
            kickerGroup.rotation.y = 0;
            legPivot.rotation.x = 0;

            document.getElementById('screen-win').classList.remove('active');
            document.getElementById('screen-miss').classList.remove('active');
            document.getElementById('swipe-hint').style.display = 'flex';
        }

        function triggerKick(powerX, powerY) {
            if (currentState !== GAME_STATE.AIMING) return;
            currentState = GAME_STATE.KICKED;
            document.getElementById('swipe-hint').style.display = 'none';

            // 1. Animate Kicker Leg
            const kickAnimInt = setInterval(() => {
                legPivot.rotation.x -= 0.2; // Swing leg forward
                if (legPivot.rotation.x <= -1) {
                    clearInterval(kickAnimInt);
                    launchBall(powerX, powerY);
                    
                    // Return leg
                    setTimeout(() => { legPivot.rotation.x = 0; }, 300);
                }
            }, 16);
        }

        function launchBall(powerX, powerY) {
            playSound('kick');

            // Map screen swipe vectors to 3D physical forces
            // Clamp horizontal spread
            const maxSpread = 12; 
            let targetX = (powerX / window.innerWidth) * maxSpread - (maxSpread/2);
            
            // Clamp vertical power
            let forwardForce = Math.min(Math.max(powerY * 0.05, 15), 30); // How hard it's kicked Z
            let upForce = Math.min(Math.max(powerY * 0.015, 2), 7);       // How high it goes Y

            // Add slight random curve/imperfection
            targetX += (Math.random() - 0.5);

            ballVelocity.set(targetX, upForce, -forwardForce);

            // Trigger Goalkeeper Dive AI
            // Goalie decides to dive left, right, or stay center
            const randomDive = Math.random();
            if (randomDive < 0.33) goalieTargetX = -(GOAL_WIDTH/3); // Dive Left
            else if (randomDive < 0.66) goalieTargetX = (GOAL_WIDTH/3);  // Dive Right
            else goalieTargetX = 0; // Stay Center
            
            goalieVelocity.x = goalieTargetX * 1.5; // Speed of dive
        }

        function handleResult(isGoal) {
            if (currentState === GAME_STATE.RESULT) return;
            currentState = GAME_STATE.RESULT;
            
            if (isGoal) {
                playSound('cheer');
                triggerConfetti();
                setTimeout(() => {
                    document.getElementById('screen-win').classList.add('active');
                }, 1000);
            } else {
                playSound('aww');
                setTimeout(() => {
                    document.getElementById('screen-miss').classList.add('active');
                }, 1000);
            }
        }

        function triggerConfetti() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: ['#004D98', '#E21C3F', '#D6A848'] // Barca colors
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: ['#004D98', '#E21C3F', '#D6A848']
                }));
            }, 250);
        }

        // --- INPUT HANDLING ---

        function handleStart(x, y) {
            if (currentState !== GAME_STATE.AIMING) return;
            touchStartX = x;
            touchStartY = y;
            touchTime = Date.now();
        }

        function handleEnd(x, y) {
            if (currentState !== GAME_STATE.AIMING) return;
            
            const dx = x - touchStartX;
            const dy = touchStartY - y; // Screen Y is inverted
            const timeDiff = Date.now() - touchTime;

            // Only register as a kick if it was a distinct swipe up/forward
            if (dy > 50 && timeDiff < 1000) {
                // Speed = Distance / Time
                triggerKick(dx, dy);
            }
        }

        // Mouse Events
        window.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        window.addEventListener('mouseup', (e) => handleEnd(e.clientX, e.clientY));
        
        // Touch Events
        window.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener('touchend', (e) => handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY));

        // UI Listeners
        document.getElementById('btn-start').addEventListener('click', startGame);
        document.getElementById('btn-play-again').addEventListener('click', resetScenario);
        document.getElementById('btn-retry').addEventListener('click', resetScenario);
        
        const muteBtn = document.getElementById('mute-btn');
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            muteBtn.innerText = isMuted ? '🔇' : '🔊';
            initAudio(); // Required for iOS context unlocking if not done yet
        });

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- MAIN RENDER LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (currentState === GAME_STATE.KICKED || currentState === GAME_STATE.RESULT) {
                
                // 1. Update Ball Physics
                ballVelocity.y += GRAVITY * dt;
                ball.position.addScaledVector(ballVelocity, dt);
                
                // Spin ball
                ball.rotation.x -= ballVelocity.z * dt * 0.5;
                ball.rotation.z += ballVelocity.x * dt * 0.5;

                // Ground Collision (Bounce)
                if (ball.position.y < 0.11) {
                    ball.position.y = 0.11;
                    ballVelocity.y *= -0.6; // Dampen bounce
                    ballVelocity.x *= 0.9;  // Friction
                    ballVelocity.z *= 0.9;
                }

                // 2. Update Goalie Animation
                if (Math.abs(goalieGroup.position.x - goalieTargetX) > 0.1) {
                    goalieGroup.position.x += goalieVelocity.x * dt;
                    // Rotate goalie to look like a dive
                    if (goalieTargetX < 0) goalieGroup.rotation.z = Math.min(goalieGroup.rotation.z + dt * 2, Math.PI/2);
                    else if (goalieTargetX > 0) goalieGroup.rotation.z = Math.max(goalieGroup.rotation.z - dt * 2, -Math.PI/2);
                }

                // 3. Collision Detection
                // Check Goalie Collision (AABB approximation)
                if (ball.position.z < GOAL_Z + 1 && ball.position.z > GOAL_Z - 1) {
                    const dz = Math.abs(ball.position.z - goalieGroup.position.z);
                    const dx = Math.abs(ball.position.x - goalieGroup.position.x);
                    const dy = Math.abs(ball.position.y - goalieGroup.position.y);
                    
                    // Simple Box collision for goalie body
                    if (dx < 0.8 && dy < 1.2 && dz < 0.5) {
                        // SAVED!
                        ballVelocity.set((ball.position.x - goalieGroup.position.x)*5, 2, 5); // Deflect away
                        handleResult(false);
                    }
                }

                // Check Goal / Miss Plane
                if (ball.position.z <= GOAL_Z && currentState !== GAME_STATE.RESULT) {
                    
                    // Check if inside goal posts
                    if (ball.position.x > -GOAL_WIDTH/2 && 
                        ball.position.x < GOAL_WIDTH/2 && 
                        ball.position.y < GOAL_HEIGHT && 
                        ball.position.y > 0) {
                        
                        // Stop ball in the net
                        ball.position.z = GOAL_Z - 0.5;
                        ballVelocity.set(0,0,0);
                        handleResult(true); // GOAL!
                        
                    } else {
                        handleResult(false); // MISS (Wide/Over)
                    }
                }
                
                // Backup constraint if ball rolls endlessly
                if (ball.position.z < -5 || ball.position.z > 20) {
                    if (currentState !== GAME_STATE.RESULT) handleResult(false);
                }
            }

            renderer.render(scene, camera);
        }

        // Start Loop
        animate();

    </script>
